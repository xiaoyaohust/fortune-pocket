name: PocketOracle

options:
  bundleIdPrefix: com.fortunepocket
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  PocketOracle:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Configs/LocalSigning.xcconfig
      Release: Configs/LocalSigning.xcconfig
    sources:
      - path: PocketOracle
        excludes:
          - Resources/Info.plist
    resources:
      - path: ../shared-content/data
        type: folder
        excludes:
          - astrology/natal_chart_test_vectors.json
          - bazi/test_vectors.json
    info:
      path: PocketOracle/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fortunepocket.ios
        PRODUCT_NAME: PocketOracle
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        INFOPLIST_FILE: PocketOracle/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: ""
  PocketOracleTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PocketOracleTests
    resources:
      - path: ../shared-content/data
        type: folder
        excludes:
          - astrology/natal_chart_test_vectors.json
          - bazi/test_vectors.json
    dependencies:
      - target: PocketOracle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fortunepocket.ios.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
